name: CI

on:
  pull_request:
    branches: [ main, master, feat/* ]
  push:
    branches: [ main, feat/* ]

jobs:
  php-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, xml

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-


      - name: PHP lint
        run: |
          set -e
          find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l || echo "No PHP files found."

      - name: Run basic checks
        run: |
          echo "Files changed:" && git --no-pager diff --name-only ${{ github.sha }} || true
